name: namasteram_news
description: Namasteram News - Hindi News App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  dio: ^5.4.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.3.1
  go_router: ^13.2.0
  get_it: ^7.7.0
  share_plus: ^9.0.0
  video_player: ^2.8.6
  visibility_detector: ^0.4.0+2
  equatable: ^2.0.5
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
