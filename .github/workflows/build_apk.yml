name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Generate Android project structure
        run: |
          flutter create --platforms=android --project-name namasteram_news --org com.namasteram /tmp/flutter_base
          cp -r /tmp/flutter_base/android ./android
          # Upgrade Kotlin to 1.9.24
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24"/' android/settings.gradle

      - name: Add INTERNET permission to release manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          echo "--- Manifest before patch ---"
          cat $MANIFEST
          # Insert INTERNET permission before <application tag if not already present
          if ! grep -q 'android.permission.INTERNET' $MANIFEST; then
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' $MANIFEST
          fi
          echo "--- Manifest after patch ---"
          cat $MANIFEST

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: namasteram-news-v${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
